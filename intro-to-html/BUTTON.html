<!DOCTYPE html>
<html>
    <head>
        <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet"> -->

        <!-- the upper is only used if the css file is different i.e.not with the html file -->
        <title>BUTTONS</title>
        <style>
        .request{
        background-color: black;
        color: white;
        border: none;
        height: 36px;
        width: 110px;
        cursor: pointer;
    }
    .cart{
        background-color: rgb(255,216,20);
        color: black;
        border: none;
        border-radius: 18px;
        height: 36px;
        width: 170px;
        cursor: pointer;
    }
    .up{
        background-color: rgb(46, 164, 79);
        color: white;
        border: none;
        border-radius: 8px;
        height: 36px;
        width: 100px;
        font-weight: bold;
        cursor: pointer;
    }
    .started{
        background-color: rgb(121, 82, 179);
        color: white;
        border: none;
        border-radius: 4px;
        height: 36px;
        width: 110px;
        font-weight: bold;
        cursor: pointer;
    }
    .Download{
        background-color: white;
        color: rgb(108, 117, 125);
        border-color: rgb(108, 117, 125);
        border-radius: 4px;
        height: 36px;
        width: 110px;
        font-weight: bold;
        cursor: pointer;
    }
    .apply{
        background-color: rgb(10, 102, 194);
        color: white;
        border: none;
        border-radius: 18px;
        height: 36px;
        width: 270px;
        font-weight: bold;
        cursor: pointer;
    }
    .save{
        background-color: white;
        color: rgb(10, 102, 194);
        border-color: rgb(10, 102, 194);
        border-radius: 18px;
        height: 36px;
        width: 110px;
        font-weight: bold;
        cursor: pointer;
    }
</style>
    </head>
    <body>
    <button class="request">Request now</button>
    <button class="cart">Add to Cart</button>
    <button class="up">Sign up</button>
    <button class="started">Get started</button>
    <button class="Download">Download</button>
    <button class="apply">Apply to company website</button>
    <button class="save">Save</button>
    </body>
    </html>
